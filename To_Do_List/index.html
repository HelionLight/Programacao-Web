<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Tarefas Inteligente</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Agenda de Tarefas</h1>
            <p class="subtitle">Organize suas atividades do dia a dia</p>
            <div class="stats">
                <span class="stat pending">Pendentes: <strong id="pending-count">0</strong></span>
                <span class="stat completed">Concluídas: <strong id="completed-count">0</strong></span>
            </div>
            <button id="theme-toggle" class="theme-btn">🌙</button>
        </header>

        <main>
            <section class="form-section">
                <h2>Nova Tarefa</h2>
                <form id="task-form">
                    <div class="form-group">
                        <label for="task-name">Nome da Tarefa:</label>
                        <input type="text" id="task-name" placeholder="Digite o nome da tarefa" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="task-category">Categoria:</label>
                        <select id="task-category" required>
                            <option value="">Selecione uma categoria</option>
                            <option value="trabalho">Trabalho</option>
                            <option value="estudos">Estudos</option>
                            <option value="pessoal">Pessoal</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="task-priority">Prioridade:</label>
                        <select id="task-priority" required>
                            <option value="">Selecione a prioridade</option>
                            <option value="alta">Alta</option>
                            <option value="media">Média</option>
                            <option value="baixa">Baixa</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="task-date">Data Limite:</label>
                        <input type="date" id="task-date" required>
                    </div>
                    
                    <button type="submit" class="btn-add">➕ Adicionar Tarefa</button>
                </form>
            </section>

            <section class="tasks-section">
                <div class="filters">
                    <h2>Minhas Tarefas</h2>
                    <div class="filter-controls">
                        <div class="filter-group">
                            <label for="filter-category">Filtrar por:</label>
                            <select id="filter-category">
                                <option value="todas">Todas</option>
                                <option value="trabalho">Trabalho</option>
                                <option value="estudos">Estudos</option>
                                <option value="pessoal">Pessoal</option>
                            </select>
                        </div>
                        
                        <div class="filter-group">
                            <label for="sort-by">Ordenar por:</label>
                            <select id="sort-by">
                                <option value="data">Data</option>
                                <option value="prioridade">Prioridade</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="task-list" class="task-list">
                    <!-- Tarefas serão inseridas aqui -->
                </div>
                
                <div id="empty-message" class="empty-message" style="display: none;">
                    <p>📭 Nenhuma tarefa encontrada</p>
                    <p class="empty-hint">Adicione uma nova tarefa ou ajuste os filtros</p>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
